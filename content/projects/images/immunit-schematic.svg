<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .h2 { font-family: Helvetica, Arial, sans-serif; font-weight:700; font-size:19px; }
      .italic-sub { font-family: Helvetica, Arial, sans-serif; font-style:italic; font-weight:700; font-size:14px; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size:13px; fill:#444; }
      .pill-text { font-family: Helvetica, Arial, sans-serif; font-weight:800; font-size:16px; fill:#ffffff; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1000" height="340" fill="#ffffff"/>

  <!-- DIVIDER PILL -->
  <line x1="55" y1="40" x2="440" y2="40" stroke="#c9c9c9" stroke-width="1"/>
  <line x1="560" y1="40" x2="945" y2="40" stroke="#c9c9c9" stroke-width="1"/>
  <rect x="330" y="20" width="340" height="40" rx="20" fill="#233a75"/>
  <text x="500" y="45" text-anchor="middle" class="pill-text">CORE EXPERTISE &amp; IMPACT</text>

  <!-- Card 1 -->
  <rect x="50" y="80" width="215" height="255" rx="12" fill="#ffffff" stroke="#3b5bab" stroke-width="1.5"/>
  <text x="157" y="110" text-anchor="middle" class="h2" fill="#233a75">Immune Response</text>
  <text x="157" y="130" text-anchor="middle" class="h2" fill="#233a75">Assessment</text>
  <g transform="translate(95,145)">
    <rect x="0" y="10" width="12" height="45" rx="5" fill="#eef2fb" stroke="#3b5bab" stroke-width="2"/>
    <rect x="2" y="30" width="8" height="24" fill="#c07d2d"/>
    <rect x="18" y="5" width="12" height="50" rx="5" fill="#eef2fb" stroke="#3b5bab" stroke-width="2"/>
    <rect x="20" y="20" width="8" height="34" fill="#2c7a75"/>
    <rect x="36" y="12" width="12" height="43" rx="5" fill="#eef2fb" stroke="#3b5bab" stroke-width="2"/>
    <rect x="38" y="28" width="8" height="26" fill="#a83c3c"/>
    <circle cx="90" cy="30" r="16" fill="#c9dfb0" stroke="#5a7a3a" stroke-width="1.5"/>
    <circle cx="84" cy="24" r="2.2" fill="#3d5a26"/>
    <circle cx="94" cy="22" r="2.2" fill="#3d5a26"/>
    <circle cx="97" cy="34" r="2.2" fill="#3d5a26"/>
    <circle cx="86" cy="38" r="2.2" fill="#3d5a26"/>
  </g>
  <text x="157" y="218" text-anchor="middle" class="italic-sub" fill="#233a75">On-target or toxicity?</text>
  <text x="157" y="245" text-anchor="middle" class="small">Flow cytometry-based</text>
  <text x="157" y="262" text-anchor="middle" class="small">immune cell characterization</text>
  <text x="157" y="279" text-anchor="middle" class="small">and Luminex cytokine profiling</text>

  <!-- Card 2 -->
  <rect x="285" y="80" width="215" height="255" rx="12" fill="#ffffff" stroke="#c07d2d" stroke-width="1.5"/>
  <text x="392" y="110" text-anchor="middle" class="h2" fill="#7a4d15">Cell Culture</text>
  <text x="392" y="130" text-anchor="middle" class="h2" fill="#7a4d15">&amp; Assays</text>
  <g transform="translate(330,150)">
    <ellipse cx="45" cy="35" rx="42" ry="22" fill="#fdf1e3" stroke="#c07d2d" stroke-width="2"/>
    <ellipse cx="45" cy="31" rx="36" ry="17" fill="#ffffff" stroke="#c07d2d" stroke-width="1.5"/>
    <circle cx="35" cy="28" r="2.5" fill="#a83c3c"/>
    <circle cx="50" cy="35" r="2.5" fill="#a83c3c"/>
    <circle cx="58" cy="24" r="2.5" fill="#a83c3c"/>
    <rect x="95" y="10" width="30" height="18" rx="4" fill="#3b5bab"/>
    <circle cx="100" cy="19" r="2" fill="#ffffff"/>
    <circle cx="107" cy="19" r="2" fill="#ffffff"/>
    <circle cx="114" cy="19" r="2" fill="#ffffff"/>
    <circle cx="121" cy="19" r="6" fill="#ffffff"/>
    <line x1="95" y1="28" x2="80" y2="45" stroke="#3b5bab" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="392" y="218" text-anchor="middle" class="italic-sub" fill="#7a4d15">Luminex &amp; Flow Cytometry</text>
  <text x="392" y="245" text-anchor="middle" class="small">In vitro assays on human</text>
  <text x="392" y="262" text-anchor="middle" class="small">blood and PBMCs</text>

  <!-- Card 3 -->
  <rect x="520" y="80" width="215" height="255" rx="12" fill="#ffffff" stroke="#2c7a75" stroke-width="1.5"/>
  <text x="627" y="110" text-anchor="middle" class="h2" fill="#1f4d49">Bioanalytical</text>
  <text x="627" y="130" text-anchor="middle" class="h2" fill="#1f4d49">Validation</text>
  <g transform="translate(585,145)">
    <rect x="0" y="0" width="65" height="80" rx="6" fill="#e6f2f1" stroke="#2c7a75" stroke-width="2"/>
    <rect x="20" y="-6" width="25" height="12" rx="3" fill="#2c7a75"/>
    <line x1="12" y1="20" x2="53" y2="20" stroke="#2c7a75" stroke-width="2"/>
    <line x1="12" y1="32" x2="53" y2="32" stroke="#2c7a75" stroke-width="2"/>
    <line x1="12" y1="44" x2="40" y2="44" stroke="#2c7a75" stroke-width="2"/>
    <circle cx="45" cy="60" r="17" fill="#2c7a75"/>
    <path d="M37,60 l5,6 l12,-14" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="627" y="255" text-anchor="middle" class="italic-sub" fill="#1f4d49">Method Development</text>
  <text x="627" y="282" text-anchor="middle" class="small">Robust assays and validation</text>
  <text x="627" y="299" text-anchor="middle" class="small">to support regulatory-ready data</text>

  <!-- Card 4 -->
  <rect x="755" y="80" width="215" height="255" rx="12" fill="#ffffff" stroke="#7a3d95" stroke-width="1.5"/>
  <text x="862" y="110" text-anchor="middle" class="h2" fill="#4d2361">Data Integrity</text>
  <text x="862" y="130" text-anchor="middle" class="h2" fill="#4d2361">&amp; Compliance</text>
  <g transform="translate(800,145)">
    <rect x="0" y="5" width="40" height="55" rx="5" fill="#f3e8f7" stroke="#7a3d95" stroke-width="2"/>
    <rect x="10" y="0" width="20" height="10" rx="3" fill="#7a3d95"/>
    <line x1="8" y1="22" x2="32" y2="22" stroke="#7a3d95" stroke-width="1.8"/>
    <line x1="8" y1="32" x2="32" y2="32" stroke="#7a3d95" stroke-width="1.8"/>
    <line x1="8" y1="42" x2="26" y2="42" stroke="#7a3d95" stroke-width="1.8"/>
    <rect x="55" y="15" width="40" height="50" rx="5" fill="#f3e8f7" stroke="#7a3d95" stroke-width="2"/>
    <rect x="65" y="10" width="20" height="10" rx="3" fill="#7a3d95"/>
    <line x1="63" y1="32" x2="87" y2="32" stroke="#7a3d95" stroke-width="1.8"/>
    <line x1="63" y1="42" x2="87" y2="42" stroke="#7a3d95" stroke-width="1.8"/>
    <line x1="63" y1="52" x2="81" y2="52" stroke="#7a3d95" stroke-width="1.8"/>
    <rect x="90" y="45" width="30" height="24" rx="5" fill="#7a3d95"/>
    <path d="M96,45 v-9 a9,9 0 0 1 18,0 v9" fill="none" stroke="#7a3d95" stroke-width="4"/>
    <circle cx="105" cy="57" r="3" fill="#ffffff"/>
  </g>
  <text x="862" y="255" text-anchor="middle" class="italic-sub" fill="#4d2361">Rigorous Documentation</text>
  <text x="862" y="282" text-anchor="middle" class="small">Protocol authoring, report</text>
  <text x="862" y="299" text-anchor="middle" class="small">writing, and GLP/GCLP compliance</text>

</svg>
